<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gerador de Cartaz - Maiolini</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Gerador de Cartaz - Maiolini Supermercados LTDA</h1>

<div class="painel">

<label>Modelo do Cartaz</label>

<select id="modelo" onchange="trocarModelo()">
<option value="modelo1">Cartaz Geral</option>
<option value="modelo2">Cartaz Hortifruti</option>
<option value="modelo3">Cartaz Açougue</option>
</select>

<label>Produto</label>
<textarea id="produto" rows="2"></textarea>

<label>Descrição</label>
<input type="text" id="descricao">

<label>Preço</label>
<input type="text" id="preco">

<label>Unidade</label>
<input type="text" id="unidade">

<label>Tamanho do Cartaz</label>

<select id="tamanho">
<option value="A3">A3</option>
<option value="A4">A4</option>
<option value="A5">A5</option>
</select>

<button onclick="imprimirCartaz()">Imprimir</button>

</div>

<div class="cartaz">   

<div class="produto" id="produtoCartaz"></div>

<div class="descricao" id="descricaoCartaz"></div>

<div class="preco" id="precoCartaz"></div>

<div class="unidade" id="unidadeCartaz"></div>

</div>

<script src="script.js"></script>
<script src="cartaz-hortifruti.js"></script>
<script src="cartaz-acougue.js"></script>
<script src="impressao.js"></script>

</body>
</html>
