<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<title>Gerador de Cartaz - Maiolini</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Gerador de Cartaz - Maiolini Supermercados LTDA</h1>

<div class="content">
<div class="painel">

<label>Modelo do Cartaz</label>

<select id="modelo" onchange="trocarModelo()">
<option value="0">Cartaz Geral</option>
<option value="1">Cartaz Hortifruti</option>
<option value="2">Cartaz Açougue</option>
</select>

<label>Produto</label>
<textarea id="produto" rows="2" placeholder="Exemplo: Refrigerante Coca Cola"></textarea>

<label>Descrição</label>
<input type="text" id="descricao" placeholder="Exemplo: 2 Litros">

<label>Preço</label>
<input type="text" id="preco" placeholder="Exemplo: 11,00">

<label>Unidade</label>
<input type="text" id="unidade" placeholder="Exemplo: Unidade ou Kg">

<div class="select">
<label>Tamanho do Cartaz</label>

<select id="tamanho">
<option value="A3">A3</option>
<option value="A4">A4</option>
<option value="A5">A5</option>
</select>
</div>

<button onclick="imprimirCartaz()">Imprimir</button>

</div>

<div class="slider-container">
    <button class="prev" onclick="mudarSlide(-1)">&#10094;</button>
    
    <div class="cartaz-slider" id="cartazSlider">
        <div class="slide active" data-index="0">
            <div class="cartaz" style="background-image: url(fundo.png);">
                <div class="produto"></div>
                <div class="descricao"></div>
                <div class="preco"></div>
                <div class="unidade"></div>
            </div>
        </div>
        <div class="slide" data-index="1">
            <div class="cartaz" style="background-image: url(hortifruti.png);">
                <div class="produto"></div>
                <div class="descricao"></div>
                <div class="preco"></div>
                <div class="unidade"></div>
            </div>
        </div>
        <div class="slide" data-index="2">
            <div class="cartaz" style="background-image: url(acougue1.png);">
                <div class="produto"></div>
                <div class="descricao"></div>
                <div class="preco"></div>
                <div class="unidade"></div>
            </div>
        </div>
    </div>

    <button class="next" onclick="mudarSlide(1)">&#10095;</button>
</div>
</div>


<h2>Gerador de Cartazes • Maiolini Supermercados<br>
Desenvolvido por Jean Paulo • Maiolini Soluções Tecnologicas • Since 2026</h2>
<script src="script.js"></script>
<script src="cartaz-hortifruti.js"></script>
<script src="cartaz-acougue.js"></script>
<script src="impressao.js"></script>

</body>
</html>
